<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;padding: 0;

        }
        main{
           display: grid;
           justify-content: center;
        }
        main div {
            
               width: fit-content;
            border: 2px dotted black;
            text-align: center;

            padding: 10px 20px;
            margin: 0 10px;
            border-radius: 10px;
        }
        #dis-1{background-color: rgb(215, 203, 203);}
        #dis-2{background-color: blue;}
        #dis-3{background-color: violet;}
        #dis-4{background-color: red;}
    </style>
</head>
<body>
    <main>

        <div id="dis-1">
            Margin
        <div id="dis-2">
            Border
            <div id="dis-3">
                Padding
                <div id="dis-4">
                    Content
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
